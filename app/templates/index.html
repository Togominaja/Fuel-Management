<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fleet Command MVP</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Fleet Command MVP</h1>
      <div class="auth-state" id="authState">Signed out</div>
    </header>

    <main>
      <section class="card" id="loginCard">
        <h2>Sign In</h2>
        <p class="hint">Default: <code>sbravatti.nelson@gmail.com</code> / <code>ChangeMe123!</code></p>
        <form id="loginForm">
          <label>
            Email
            <input type="email" name="email" required value="sbravatti.nelson@gmail.com" />
          </label>
          <label>
            Password
            <input type="password" name="password" required value="ChangeMe123!" />
          </label>
          <button type="submit">Sign In</button>
        </form>
        <p id="loginError" class="error"></p>
      </section>

      <section class="grid stats hidden" id="statsGrid">
        <article class="stat card">
          <h3>Transactions (30d)</h3>
          <p id="statTransactions">0</p>
        </article>
        <article class="stat card">
          <h3>Gallons (30d)</h3>
          <p id="statGallons">0</p>
        </article>
        <article class="stat card">
          <h3>Fuel Spend (30d)</h3>
          <p id="statSpend">$0</p>
        </article>
        <article class="stat card">
          <h3>Alerts</h3>
          <p id="statAlerts">0</p>
        </article>
      </section>

      <section class="card hidden" id="txFormCard">
        <h2>Log Fuel Transaction</h2>
        <form id="txForm" class="grid two-col">
          <label>
            Vehicle
            <select name="vehicle_id" id="vehicleSelect" required></select>
          </label>
          <label>
            Driver
            <select name="driver_id" id="driverSelect" required></select>
          </label>
          <label>
            Fuel Site
            <select name="fuel_site_id" id="siteSelect"></select>
          </label>
          <label>
            Odometer
            <input name="odometer" type="number" min="1" required />
          </label>
          <label>
            Gallons
            <input name="gallons" type="number" min="0.1" step="0.1" required />
          </label>
          <label>
            Price / Gallon
            <input name="price_per_gallon" type="number" min="0.01" step="0.01" required />
          </label>
          <label>
            Source
            <select name="source">
              <option value="manual">manual</option>
              <option value="card">card</option>
              <option value="telematics">telematics</option>
            </select>
          </label>
          <label>
            Card Last4
            <input name="card_last4" maxlength="4" minlength="4" placeholder="1234" />
          </label>
          <label class="full">
            Notes
            <textarea name="notes" rows="2" placeholder="Optional notes"></textarea>
          </label>
          <button type="submit" class="full">Submit Transaction</button>
        </form>
        <p id="txResult"></p>
      </section>

      <section class="card hidden" id="txTableCard">
        <h2>Recent Fuel Transactions</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Vehicle</th>
                <th>Driver</th>
                <th>Site</th>
                <th>Gallons</th>
                <th>Price</th>
                <th>Odometer</th>
              </tr>
            </thead>
            <tbody id="txBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card hidden" id="alertsCard">
        <h2>Anomaly Alerts</h2>
        <ul id="alertsList" class="alerts"></ul>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
