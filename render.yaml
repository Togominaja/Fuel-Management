databases:
  - name: afm-db
    databaseName: afm
    user: afm_user
    plan: basic-1gb

services:
  - type: web
    name: automated-fuel-management
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: "sbravatti.nelson@gmail.com"
      - key: BOOTSTRAP_ADMIN_PASSWORD
        generateValue: true
      - key: SEED_DEMO_DATA
        value: "false"
